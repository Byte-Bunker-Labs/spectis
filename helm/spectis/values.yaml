# Spectis Helm Values

replicaCount: 1

image:
  repository: spectis-orchestrator
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Application configuration
config:
  jwtExpireMinutes: "60"
  logLevel: "info"
  corsOrigins: "*"
  auditLogDir: "/app/logs"

# -- Secrets (override via --set or external secret management)
secrets:
  jwtSecretKey: "change-me-in-production"
  # Database credentials are managed by the postgresql subchart

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: spectis.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: spectis-tls
  #    hosts:
  #      - spectis.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# -- PostgreSQL subchart configuration
postgresql:
  enabled: true
  auth:
    username: spectis
    password: spectis
    database: spectis
  primary:
    persistence:
      enabled: true
      size: 10Gi
